<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GhostWare — Advanced OSINT Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./css/style.css" />
<link rel="icon" href="./assets/reaper.svg" />
<style>
.landing-page {
  min-height: 100vh;
  background: linear-gradient(135deg, #000000 0%, #0a0a0a 100%);
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 20px;
}

.landing-logo {
  position: absolute;
  top: 30px;
  left: 30px;
}

.landing-logo .reaper {
  width: 40px;
  height: 40px;
}

.landing-logo .brand-name {
  font-size: 20px;
}

.landing-login-btn {
  position: absolute;
  top: 30px;
  right: 30px;
  background: var(--panel-2);
  color: var(--txt);
  padding: 8px 16px;
  border: 1px solid var(--line);
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

.landing-login-btn:hover {
  background: var(--panel);
  transform: translateY(-1px);
}

.landing-content {
  max-width: 800px;
  margin: 0 auto;
}

.landing-title {
  font-size: 48px;
  font-weight: 800;
  color: var(--txt);
  margin: 0 0 16px 0;
  letter-spacing: -1px;
}

.landing-title .accent {
  color: var(--txt-dim);
}

.landing-subtitle {
  font-size: 18px;
  color: var(--txt-dim);
  margin: 0 0 40px 0;
  line-height: 1.4;
}

.landing-cta {
  background: var(--panel-2);
  color: var(--txt);
  padding: 14px 28px;
  border: 1px solid var(--line);
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-bottom: 50px;
}

.landing-cta:hover {
  background: var(--panel);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(255, 255, 255, 0.1);
}

.global-network {
  margin-top: 60px;
}

.world-map-img {
  width: 100%;
  max-width: 700px;
  height: auto;
  margin: 0 auto;
  display: block;
  border-radius: 12px;
  filter: sepia(0.15) hue-rotate(165deg) saturate(1.4) brightness(0.95);
}

@media (max-width: 768px) {
  .landing-title { font-size: 36px; }
  .landing-subtitle { font-size: 16px; }
  .landing-login-btn { top: 20px; right: 20px; }
}
</style>
</head>
<body>
<div id="grid"></div>
<div id="aura"></div>
<div id="glow"></div>

<div class="landing-page">
  <div class="landing-logo brand">
    <div class="reaper" data-reaper></div>
    <span class="brand-name shimmer">GHOST<span class="accent">WARE</span></span>
  </div>
  <button class="landing-login-btn" onclick="goToAuth()">Login</button>
  
  <div class="landing-content">
    <h1 class="landing-title">GHOSTWARE <span class="accent">Tool</span></h1>
    <p class="landing-subtitle">Professional data management platform built for reliability and performance</p>
    
    <button class="landing-cta" onclick="goToAuth()">Get Started</button>
    
    <div class="global-network">
      <img src="./assets/global-network.png" alt="Global Network" class="world-map-img" />
    </div>
  </div>
</div>

<!-- reaper logo injected -->
<script src="./js/logo.js"></script>
<script src="./js/effects.js"></script>
<script>
function goToAuth() {
  window.location.href = 'auth.html';
}

// Check if already logged in
if (window.GWAuth && window.GWAuth.session.get()) {
  window.location.href = 'dashboard.html';
}

window.GWWire();
</script>
</body>
</html>
