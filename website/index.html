<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GhostWare — Advanced OSINT Platform</title>
<meta property="og:type"         content="website">
<meta property="og:title"        content="GhostWare">
<meta property="og:description"  content="Advanced OSINT platform built for performance and reliability.">
<meta property="og:site_name"    content="GhostWare">
<meta name="twitter:card"        content="summary_large_image">
<meta name="twitter:title"       content="GhostWare">
<meta name="twitter:description" content="Advanced OSINT platform.">
<meta name="referrer"            content="no-referrer">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="icon" href="./assets/reaper.svg"/>
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}

/* ── Tokens ── */
:root{
  --bg:#09090b;
  --surface:rgba(9,9,11,0.6);
  --border:rgba(255,255,255,0.08);
  --border-glow:rgba(255,255,255,0.18);
  --bh:rgba(255,255,255,0.18);
  --txt:#e4e4e7;--dim:#71717a;--faint:#3f3f46;
  --good:#4ade80;--bad:#f87171;
  --f:'Inter',system-ui,sans-serif;
  --fd:'Space Grotesk','Inter',system-ui,sans-serif;
  --m:'JetBrains Mono',ui-monospace,monospace;
  --r:12px;
  --ease:cubic-bezier(.2,.8,.2,1);
}
body{font-family:var(--f);background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}

/* ── Background ── */
#grid{position:fixed;inset:-2px;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,0.023) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.023) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,#000 40%,transparent 100%)}
#glow{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(800px circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,0.035),transparent 60%);
  will-change:background}

/* ── Nav ── */
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:64px;
  display:flex;align-items:center;justify-content:space-between;padding:0 40px;
  background:rgba(9,9,11,0.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none}
.brand .reaper{width:28px;height:28px;flex-shrink:0}
.brand-name{font-family:var(--fd);font-size:16px;font-weight:700;letter-spacing:-0.01em;color:#fff}
.brand-name .accent{color:var(--dim)}
.nav-links{display:flex;align-items:center;gap:4px;list-style:none}
.nav-links a{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:13px;
  font-weight:500;color:var(--dim);border-radius:8px;text-decoration:none;cursor:pointer;
  border:1px solid transparent;transition:color .2s var(--ease),background .2s var(--ease),border-color .2s var(--ease)}
.nav-links a svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;
  transition:transform .2s var(--ease)}
.nav-links a:hover{background:rgba(255,255,255,0.04);color:#fff}
.nav-links a:hover svg{transform:translateY(-1px)}
.nav-links a.on{color:#fff;background:rgba(255,255,255,0.06);border-color:var(--border)}
.nav-r{display:flex;align-items:center;gap:10px}
.btn-g{height:36px;padding:0 16px;border-radius:8px;background:transparent;border:1px solid var(--border);
  font-size:13px;font-weight:500;color:var(--txt);font-family:var(--f);cursor:pointer;
  transition:background .15s,border-color .15s}
.btn-g:hover{background:rgba(255,255,255,0.04);border-color:var(--bh)}
.btn-p{height:36px;padding:0 18px;border-radius:8px;background:#fff;border:none;
  font-size:13px;font-weight:600;color:#09090b;font-family:var(--fd);cursor:pointer;
  transition:background .15s,transform .15s;box-shadow:0 4px 12px rgba(255,255,255,0.08)}
.btn-p:hover{background:#e4e4e7;transform:translateY(-1px)}

/* ── Pages ── */
main{position:relative;z-index:1;padding-top:64px;min-height:100vh}
.page{display:none}
.page.active{display:block}

/* ── HOME — Split layout ── */
#pg-home{min-height:calc(100vh - 64px);display:flex;align-items:center;padding:0 40px;gap:64px;max-width:1280px;margin:0 auto}
.hero-left{flex:0 0 auto;max-width:480px;width:100%}
.hero-badge{display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  padding:4px 12px;border-radius:999px;font-size:11px;font-weight:600;
  letter-spacing:.06em;color:var(--dim);text-transform:uppercase;margin-bottom:20px}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--good);box-shadow:0 0 8px var(--good)}
.hero-title{font-size:54px;font-weight:800;letter-spacing:-1.8px;color:#fff;line-height:1.05;margin-bottom:16px}
.hero-title em{color:var(--dim);font-style:normal}
.hero-sub{font-size:15px;color:var(--dim);line-height:1.65;margin-bottom:32px}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:40px}
.hcta{height:42px;padding:0 22px;border-radius:10px;background:#fff;border:none;
  font-size:13.5px;font-weight:700;color:#000;font-family:var(--f);cursor:pointer;
  transition:background .15s,transform .15s;box-shadow:0 4px 18px rgba(255,255,255,0.1)}
.hcta:hover{background:#e4e4e7;transform:translateY(-1px)}
.hcta-g{height:42px;padding:0 22px;border-radius:10px;background:transparent;
  border:1px solid var(--border);font-size:13.5px;font-weight:500;color:var(--txt);
  font-family:var(--f);cursor:pointer;transition:background .15s,border-color .15s}
.hcta-g:hover{background:rgba(255,255,255,0.04);border-color:var(--bh)}
.hero-chips{display:flex;gap:7px;flex-wrap:wrap}
.chip-feat{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);font-size:11.5px;font-weight:500;color:var(--dim)}
.chip-feat svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}

/* ── 3D Dashboard image ── */
.hero-right{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;perspective:1200px;perspective-origin:50% 50%}
.img-3d-wrap{position:relative;width:100%;max-width:660px;cursor:grab;user-select:none;
  transform-style:preserve-3d;
  transform:rotateY(-8deg) rotateX(4deg);
  transition:transform .08s linear;
  will-change:transform}
.img-3d-wrap:active{cursor:grabbing}
.img-3d-wrap img{width:100%;border-radius:14px;
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 40px 80px rgba(0,0,0,0.8),0 0 0 1px rgba(255,255,255,0.04),
    inset 0 1px 0 rgba(255,255,255,0.08);
  display:block}
/* Gloss overlay */
.img-3d-wrap::after{content:'';position:absolute;inset:0;border-radius:14px;
  background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,transparent 50%,rgba(0,0,0,0.2) 100%);
  pointer-events:none}

/* ── Inner pages ── */
.inner{max-width:820px;margin:0 auto;padding:52px 24px 72px}
.pg-title{font-size:28px;font-weight:800;letter-spacing:-.5px;color:#fff;margin-bottom:6px}
.pg-sub{font-size:13px;color:var(--dim);margin-bottom:36px;line-height:1.6}

/* ── Updates ── */
.ulist{display:grid;gap:10px}
.ui{display:flex;gap:16px;align-items:flex-start;padding:16px 18px;
  background:rgba(255,255,255,0.02);border:1px solid var(--border);
  border-radius:var(--r);transition:border-color .15s}
.ui:hover{border-color:var(--bh)}
.ud{font-family:var(--m);font-size:10.5px;color:var(--faint);white-space:nowrap;padding-top:2px;min-width:66px}
.ub h4{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:4px}
.ub p{font-size:12px;color:var(--dim);line-height:1.55}
.ubadge{margin-left:auto;flex-shrink:0;align-self:flex-start;font-size:9px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:999px;
  border:1px solid var(--border);color:var(--dim)}
.ubadge.new{color:var(--good);border-color:rgba(74,222,128,.25)}
.ubadge.fix{color:#fbbf24;border-color:rgba(251,191,36,.25)}

/* ── OSINT Tools ── */
#pg-tools{padding:52px 0 72px}
.tools-wrap{max-width:840px;margin:0 auto;padding:0 24px}
.ltabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:28px;
  border-bottom:1px solid var(--border);padding-bottom:0}
.ltab{padding:8px 14px;font-size:12.5px;font-weight:500;color:var(--dim);
  cursor:pointer;background:none;border:none;font-family:var(--f);
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
.ltab:hover{color:var(--txt)}
.ltab.on{color:#fff;border-bottom-color:#fff}
.lform{display:flex;gap:8px;margin-bottom:28px}
.linput{flex:1;height:42px;padding:0 16px;background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:10px;font-size:14px;color:var(--txt);
  font-family:var(--f);outline:none;transition:border-color .2s,background .2s}
.linput::placeholder{color:var(--faint)}
.linput:focus{border-color:var(--bh);background:rgba(255,255,255,0.06)}
.lbtn{height:42px;padding:0 20px;border-radius:10px;background:#fff;border:none;
  font-size:13px;font-weight:700;color:#000;font-family:var(--f);cursor:pointer;
  transition:background .15s,transform .15s;white-space:nowrap}
.lbtn:hover{background:#e4e4e7;transform:translateY(-1px)}
.lbtn:disabled{background:rgba(255,255,255,0.15);color:rgba(0,0,0,0.4);cursor:not-allowed;transform:none}
.rcard{background:rgba(255,255,255,0.02);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.rhead{display:flex;align-items:center;gap:14px;padding:18px 20px;border-bottom:1px solid var(--border)}
.rav{width:42px;height:42px;border-radius:10px;background:rgba(255,255,255,0.06);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:var(--dim);flex-shrink:0;overflow:hidden}
.rav img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.rtitle{font-size:16px;font-weight:700;color:#fff;margin-bottom:2px}
.rsub{font-size:12px;color:var(--dim)}
.rgrid{display:grid;grid-template-columns:repeat(2,1fr)}
.rrow{display:flex;flex-direction:column;gap:2px;padding:12px 20px;
  border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.rrow:nth-child(even){border-right:none}
.rrow:last-child,.rrow:nth-last-child(2):nth-child(odd){border-bottom:none}
.rk{font-size:11px;font-weight:500;color:var(--dim);text-transform:uppercase;letter-spacing:.04em}
.rv{font-size:13px;font-weight:500;color:var(--txt);font-family:var(--m);word-break:break-all}
.rv.good{color:var(--good)}.rv.bad{color:var(--bad)}
.rchips{padding:16px 20px;border-top:1px solid var(--border)}
.rchips-lbl{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;
  letter-spacing:.04em;margin-bottom:10px}
.rchips-list{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:4px 10px;border-radius:999px;font-size:11.5px;font-weight:500;
  border:1px solid var(--border);color:var(--dim)}
.chip.on{color:#fff;border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.06)}
.lload{display:flex;align-items:center;justify-content:center;gap:10px;
  padding:48px 20px;color:var(--dim);font-size:13px}
.spin{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.1);
  border-top-color:rgba(255,255,255,0.5);animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.lerr{padding:16px 20px;border-radius:var(--r);
  background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.2);
  color:var(--bad);font-size:13px}

/* ── Responsive ── */
@media(max-width:1024px){
  #pg-home{flex-direction:column;padding:40px 24px;gap:48px;padding-top:40px}
  .hero-left{max-width:100%}
  .hero-right{width:100%}
}
@media(max-width:768px){
  nav{padding:0 20px}
  .nav-links{display:none}
  .hero-title{font-size:40px}
  .inner{padding:36px 16px 56px}
  .tools-wrap{padding:0 16px}
  .ltab{padding:7px 10px;font-size:11.5px}
  .rgrid{grid-template-columns:1fr}
  .rrow{border-right:none}
  .rrow:nth-last-child(2){border-bottom:1px solid var(--border)}
  .rrow:last-child{border-bottom:none}
}
</style>
</head>
