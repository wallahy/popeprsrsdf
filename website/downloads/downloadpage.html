<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GhostWare v1.2.0 — Downloads</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
<script src="../css/style.css.js"></script>
<link rel="icon" href="../assets/reaper.svg" />
<style>
body { overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }

/* ── Nav ── */
.gw-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 64px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--line);
}
.gw-nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
.gw-nav-brand .reaper { width: 28px; height: 28px; filter: drop-shadow(0 0 8px rgba(235,235,235,0.3)); transition: filter .3s; }
.gw-nav-brand:hover .reaper { filter: drop-shadow(0 0 16px rgba(235,235,235,0.6)); }
.gw-nav-name { font-weight: 800; font-size: 16px; letter-spacing: .5px; color: #fff; }
.gw-nav-name span { color: #6a6a6a; font-weight: 500; }
.gw-nav-right { display: flex; align-items: center; gap: 10px; }
.gw-btn-ghost {
  height: 36px; padding: 0 16px; border-radius: 8px;
  background: transparent; border: 1px solid var(--line);
  font-size: 13px; font-weight: 500; color: var(--txt);
  cursor: pointer; font-family: var(--font);
  transition: background .15s, border-color .15s; text-decoration: none;
  display: inline-flex; align-items: center;
}
.gw-btn-ghost:hover { background: rgba(255,255,255,0.04); border-color: var(--line-strong); }
.gw-btn-primary {
  height: 36px; padding: 0 18px; border-radius: 8px;
  background: #e0e0e0; border: none;
  font-size: 13px; font-weight: 700; color: #000;
  cursor: pointer; font-family: var(--font); text-decoration: none;
  display: inline-flex; align-items: center;
  transition: background .15s, transform .15s, box-shadow .15s;
  box-shadow: 0 4px 14px rgba(255,255,255,0.08);
}
.gw-btn-primary:hover { background: #fff; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,255,255,0.15); }

/* ── Page ── */
main { position: relative; z-index: 2; flex: 1; padding: 96px 24px 64px; }
.page-wrap { max-width: 860px; margin: 0 auto; }

/* header */
.dl-header { margin-bottom: 48px; }
.dl-badge {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--line);
  padding: 5px 14px; border-radius: 999px;
  font-size: 11px; font-weight: 700; letter-spacing: .06em;
  color: #fff; text-transform: uppercase; margin-bottom: 18px;
}
.dl-badge-dot { width: 6px; height: 6px; background: #7dffa0; border-radius: 50%; box-shadow: 0 0 8px #7dffa0; }
.dl-title { font-size: 36px; font-weight: 800; letter-spacing: -.5px; color: var(--txt); margin-bottom: 10px; }
.dl-title span { color: var(--txt-dim); font-weight: 400; }
.dl-sub { font-size: 15px; color: var(--txt-dim); line-height: 1.6; max-width: 560px; }

/* main download card */
.dl-card {
  background: linear-gradient(180deg, rgba(20,20,20,0.9), rgba(8,8,8,0.9));
  border: 1px solid var(--line-strong);
  border-radius: 20px; padding: 32px 36px; margin-bottom: 24px;
  position: relative; overflow: hidden;
}
.dl-card::before {
  content: ''; position: absolute; inset: -1px; border-radius: 21px; padding: 1px;
  background: linear-gradient(160deg, rgba(255,255,255,0.14), transparent 50%, rgba(255,255,255,0.06));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
}
.dl-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 24px; }
.dl-card-info h2 { font-size: 20px; font-weight: 800; color: var(--txt); margin-bottom: 6px; }
.dl-card-info .meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.dl-meta-pill {
  font-family: var(--mono); font-size: 11px; color: var(--txt-faint);
  border: 1px solid var(--line); border-radius: 6px; padding: 3px 9px;
}
.dl-btn {
  display: inline-flex; align-items: center; gap: 10px;
  background: linear-gradient(180deg, #e8e8e8, #c8c8c8);
  color: #000; border: none; border-radius: 10px;
  padding: 14px 28px; font-size: 14px; font-weight: 700;
  font-family: var(--font); cursor: pointer; white-space: nowrap;
  flex-shrink: 0; text-decoration: none;
  transition: filter .15s, transform .15s, box-shadow .15s;
  box-shadow: 0 4px 16px rgba(255,255,255,0.1);
}
.dl-btn:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 6px 24px rgba(255,255,255,0.18); }
.dl-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
.dl-divider { height: 1px; background: var(--line); margin-bottom: 22px; }
.dl-features { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
.dl-feat { display: flex; align-items: flex-start; gap: 10px; }
.dl-feat-icon { width: 30px; height: 30px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border: 1px solid var(--line); border-radius: 7px; background: rgba(255,255,255,0.04); margin-top: 1px; }
.dl-feat-icon svg { width: 14px; height: 14px; stroke: var(--txt-dim); fill: none; stroke-width: 2; }
.dl-feat-text h4 { font-size: 13px; font-weight: 600; color: var(--txt); margin-bottom: 3px; }
.dl-feat-text p  { font-size: 12px; color: var(--txt-dim); line-height: 1.5; }

/* secondary cards row */
.dl-secondary { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
.dl-sec-card {
  background: linear-gradient(180deg, var(--panel-2), var(--panel));
  border: 1px solid var(--line); border-radius: var(--radius); padding: 22px 24px;
  transition: border-color .2s;
}
.dl-sec-card:hover { border-color: var(--line-strong); }
.dl-sec-card h3 { font-size: 14px; font-weight: 700; color: var(--txt); margin-bottom: 6px; }
.dl-sec-card p  { font-size: 12.5px; color: var(--txt-dim); line-height: 1.55; margin-bottom: 14px; }
.dl-sec-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; color: var(--txt-dim);
  border: 1px solid var(--line); border-radius: 7px; padding: 7px 13px;
  text-decoration: none; cursor: pointer;
  transition: color .15s, border-color .15s, background .15s;
}
.dl-sec-link:hover { color: #fff; border-color: var(--line-strong); background: rgba(255,255,255,0.04); }
.dl-sec-link svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }

/* changelog */
.dl-section-title { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--txt-faint); margin-bottom: 14px; }
.changelog { display: grid; gap: 10px; }
.cl-item {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 14px 18px; background: linear-gradient(180deg, var(--panel-2), var(--panel));
  border: 1px solid var(--line); border-radius: var(--radius);
}
.cl-tag { font-size: 9.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 999px; border: 1px solid; flex-shrink: 0; margin-top: 1px; }
.cl-tag.new  { color: #7dffa0; border-color: rgba(125,255,160,0.35); }
.cl-tag.fix  { color: #f4c96a; border-color: rgba(244,201,106,0.35); }
.cl-tag.impr { color: #a0c4ff; border-color: rgba(160,196,255,0.35); }
.cl-text h4  { font-size: 13px; font-weight: 600; color: var(--txt); margin-bottom: 3px; }
.cl-text p   { font-size: 12px; color: var(--txt-dim); line-height: 1.5; }

/* requirement row */
.req-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 40px; }
.req-item { padding: 14px 16px; background: linear-gradient(180deg, var(--panel-2), var(--panel)); border: 1px solid var(--line); border-radius: var(--radius); }
.req-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--txt-faint); margin-bottom: 6px; }
.req-val   { font-family: var(--mono); font-size: 13px; color: var(--txt); }

/* responsive */
@media (max-width: 720px) {
  .gw-nav { padding: 0 20px; }
  .dl-card { padding: 24px 20px; }
  .dl-card-top { flex-direction: column; }
  .dl-btn { width: 100%; justify-content: center; }
  .dl-features { grid-template-columns: 1fr 1fr; }
  .dl-secondary { grid-template-columns: 1fr; }
  .req-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 480px) {
  .dl-features { grid-template-columns: 1fr; }
  .req-grid { grid-template-columns: 1fr; }
}
</style>
</head>
